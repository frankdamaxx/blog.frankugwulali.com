<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #d3d3d3;   /* light grey */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 2.5rem 3rem;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #333;
        }
        .countdown-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 1rem;
        }
        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .time-box span {
            font-size: 2rem;
            font-weight: bold;
            background: #2c3e66;
            color: white;
            padding: 0.5rem;
            border-radius: 8px;
            min-width: 75px;
            letter-spacing: 2px;
        }
        .colon {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e66;
            margin-bottom: 1.5rem; /* Aligns the colon with the numbers, above the labels */
        }
        .label {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            color: #555;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }
        p.message {
            margin-top: 2rem;
            font-size: 1rem;
            color: #444;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.8rem; }
            .time-box span { 
                font-size: 1.5rem; 
                min-width: 60px; 
                padding: 0.4rem; 
            }
            .colon { font-size: 1.5rem; }
            .label { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ Blog Coming Soon! ✨</h1>
        
        <div class="countdown-wrapper" id="timer">
            <div class="time-box">
                <span id="days">00</span>
                <div class="label">Days</div>
            </div>
            <div class="colon">:</div>
            <div class="time-box">
                <span id="hours">00</span>
                <div class="label">Hours</div>
            </div>
            <div class="colon">:</div>
            <div class="time-box">
                <span id="minutes">00</span>
                <div class="label">Minutes</div>
            </div>
            <div class="colon">:</div>
            <div class="time-box">
                <span id="seconds">00</span>
                <div class="label">Seconds</div>
            </div>
        </div>

        <p class="message">We're working hard to bring you something awesome. Stay tuned and glued!</p>
    </div>

    <script>
        // Set the countdown target to exactly 48 hours from the start of March 26, 2026.
        // This makes the deadline March 28, 2026 at midnight.
        const targetTime = new Date("March 28, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetTime - now;

            // If the countdown is over, display zeros and stop the timer
            if (distance < 0) {
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
                return;
            }

            // Calculate days, hours, minutes, seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display with leading zeros using padStart
            document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');
        }

        // Run once immediately to avoid a 1-second delay
        updateCountdown();
        
        // Update every second
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
